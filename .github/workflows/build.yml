name: build

on:
  push:
    branches: [ "main" ]
    tags: [ "v*" ]
  pull_request:
    branches: [ "main" ]

jobs:
  linux:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4
      with:
        submodules: true
    - name: Install dependencies
      run: |
        sudo apt update
        sudo apt install -y make g++ libpcsclite-dev pkgconf
    - name: Install tsduck
      run: |
        cd thirdparty/tsduck
        scripts/install-prerequisites.sh
        make -j10
        sudo make install
    - name: make
      run: make

  windows:
    runs-on: windows-latest
    permissions:
      contents: write

    steps:
    - uses: actions/checkout@v4
      with:
        submodules: recursive
    - uses: actions/setup-python@v5
      with:
        python-version: "3.x"
    - uses: microsoft/setup-msbuild@v2

    - name: Select MSVC toolset
      shell: pwsh
      run: |
        $ErrorActionPreference = "Stop"
        $vswhere = "${env:ProgramFiles(x86)}\Microsoft Visual Studio\Installer\vswhere.exe"
        $vsPath = & $vswhere -latest -products * -requires Microsoft.VisualStudio.Component.VC.Tools.x86.x64 -property installationPath
        $vcToolsVersion = Get-ChildItem "$vsPath\VC\Tools\MSVC" -Directory |
          Sort-Object { [version]$_.Name } -Descending |
          Select-Object -First 1 -ExpandProperty Name
        if (-not $vcToolsVersion) {
          throw "MSVC toolset was not found"
        }
        "VCToolsVersion=$vcToolsVersion" >> $env:GITHUB_ENV
        Write-Host "Using MSVC toolset $vcToolsVersion"

    - name: Build static TSDuck
      env:
        _CL_: /D_USE_STD_VECTOR_ALGORITHMS=0 /MT /WX-
      run: msbuild thirdparty\tsduck\scripts\msvc\tsduck.sln /m /t:tsducklib /p:Configuration=Release /p:Platform=x64 "/p:VCToolsVersion=$env:VCToolsVersion"

    - name: Build dantto4k
      run: msbuild msvc\dantto4k.sln /m /p:Configuration=Release /p:Platform=x64 "/p:VCToolsVersion=$env:VCToolsVersion"

    - name: Package Windows x64
      shell: pwsh
      run: |
        $ErrorActionPreference = "Stop"
        $packageDir = "dist\dantto4k"
        New-Item -ItemType Directory -Force -Path $packageDir | Out-Null

        Copy-Item "msvc\x64\Release\dantto4k.exe" $packageDir
        Copy-Item "msvc\x64\Release\BonDriver_dantto4k.dll" $packageDir
        Copy-Item "ini\BonDriver_dantto4k.ini" $packageDir

        Compress-Archive -Path "$packageDir\*" -DestinationPath "dist\dantto4k-windows-x64.zip" -Force

    - uses: actions/upload-artifact@v4
      with:
        name: dantto4k-windows-x64
        path: dist\dantto4k-windows-x64.zip

    - name: Publish GitHub release
      if: startsWith(github.ref, 'refs/tags/')
      shell: pwsh
      env:
        GH_TOKEN: ${{ github.token }}
      run: |
        $ErrorActionPreference = "Stop"
        $tag = "${{ github.ref_name }}"
        gh release view $tag *> $null
        if ($LASTEXITCODE -eq 0) {
          gh release upload $tag "dist\dantto4k-windows-x64.zip" --clobber
        }
        else {
          gh release create $tag "dist\dantto4k-windows-x64.zip" --title $tag --notes "Windows x64 static build"
        }
